# Build signed/notarized release bundles for the Jonggrang Tunnel desktop app
# across macOS (universal: Intel + Apple Silicon) and Linux.
#
# WHY A MATRIX (and not a single job): Tauri cannot cross-compile a bundle for
# one OS from another — each platform's bundle needs that platform's native
# toolchain (Apple SDK + codesign on macOS, WebKitGTK on Linux). The only way to
# produce BOTH platform binaries is to run each build on its own native runner.
#
# macOS bundles are CODE-SIGNED + NOTARIZED when the Apple secrets below are
# present (see SIGNING.md). Without those secrets the macOS leg still builds,
# but produces an UNSIGNED .dmg that other Macs flag as "damaged" / "unverified
# developer". Linux needs no signing.
#
# All third-party actions are pinned to specific released versions to keep CI
# reproducible. For stricter supply-chain hardening swap tags for commit SHAs.
name: build

on:
  push:
    # Feature branch CI + version tags (e.g. v1.2.3) which also cut a Release.
    branches:
      - feat/jonggrang-tunnel-desktop
    tags:
      - 'v*'
  pull_request:
    branches:
      - feat/jonggrang-tunnel-desktop

jobs:
  build:
    permissions:
      # `contents: write` lets tauri-action create/attach a GitHub Release when
      # the run is triggered by a version tag push. Harmless on branch/PR runs.
      contents: write
    strategy:
      # Don't cancel other legs if one platform fails — we want every binary we
      # can get even if one platform breaks.
      fail-fast: false
      matrix:
        include:
          # macOS: one universal binary covering Intel (x86_64) AND Apple Silicon
          # (aarch64). `--target universal-apple-darwin` makes Tauri lipo both
          # arch slices into a single .app/.dmg that runs on any modern Mac.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux: .deb + .AppImage. No signing required.
          - platform: ubuntu-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # Linux-only: the WebKit/GTK stack tauri/wry link against is not present on
      # a bare ubuntu-latest runner. Install it BEFORE any cargo build/test so the
      # libdbus/webkit2gtk/libsoup sys-deps resolve. (macOS/Windows use system WebView.)
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
          # Cache the npm download cache keyed off package-lock.json.
          cache: npm

      - name: Set up Rust toolchain
        # dtolnay/rust-toolchain is the Tauri-recommended toolchain action; it is
        # channel-pinned here to `stable`. `targets` adds extra compile targets
        # (both macOS arches for the universal build); empty on other platforms.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2.7.5
        with:
          # Cargo.toml/Cargo.lock live in src-tauri, so cache that workspace.
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Run the Rust unit/integration tests on every leg — the tunnel-spec
      # parsing, port allocation, and lifecycle logic must pass on all platforms.
      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      # Build (and on a version tag, release) the bundles. macOS signing +
      # notarization kick in automatically when the APPLE_* env below are set as
      # repo secrets; otherwise the macOS bundle is unsigned. See SIGNING.md.
      - name: Build release bundles
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS code signing (Developer ID Application) ---
          # base64-encoded .p12 cert + its password, and the identity string.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # --- macOS notarization (Apple ID + app-specific password) ---
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # tagName empty on non-tag runs → tauri-action builds without releasing.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Jonggrang Tunnel {0}', github.ref_name) || '' }}
          releaseBody: 'Automated macOS (universal .dmg/.app) and Linux (.deb/.AppImage) bundles built by CI.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Upload the built bundles as workflow artifacts on EVERY run (branch, PR,
      # and tag) so they're downloadable from the Actions run page regardless of
      # whether a Release was cut. Per-OS paths differ; missing ones are warned.
      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4.4.3
        with:
          name: bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

# Build macOS + Linux release bundles for the Jonggrang Tunnel desktop app.
#
# WHY A MATRIX (and not a single Linux job): Tauri cannot cross-compile a macOS
# bundle from Linux — the macOS .app/.dmg needs the Apple SDK + codesign tooling
# that only exists on a macOS host. There is no Linux→macOS cross-compile path,
# so the only way to produce BOTH platform binaries is to run the build on its
# own native runner: `macos-latest` for .dmg/.app and `ubuntu-latest` for
# .deb/.AppImage. This workflow is the canonical way to obtain both binaries.
#
# All third-party actions are pinned to specific released versions to keep CI
# reproducible and avoid drift when an action publishes a new major/minor. For
# stricter supply-chain hardening these tags can be swapped for the equivalent
# full-length commit SHAs.
name: build

on:
  push:
    # Feature branch CI + version tags (e.g. v1.2.3) which also cut a Release.
    branches:
      - feat/jonggrang-tunnel-desktop
    tags:
      - 'v*'
  pull_request:
    branches:
      - feat/jonggrang-tunnel-desktop

jobs:
  build:
    permissions:
      # `contents: write` lets tauri-action create/attach a GitHub Release when
      # the run is triggered by a version tag push. Harmless on branch/PR runs.
      contents: write
    strategy:
      # Don't cancel the macOS leg if Linux fails (or vice-versa) — we want both
      # binaries even if one platform breaks.
      fail-fast: false
      matrix:
        # macos-latest → .dmg/.app  |  ubuntu-latest → .deb/.AppImage.
        # macOS MUST build on a macOS runner (no cross-compile from Linux).
        platform:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # Linux-only: the WebKit/GTK stack tauri/wry link against is not present on
      # a bare ubuntu-latest runner. Install it BEFORE any cargo build/test so the
      # libdbus/webkit2gtk/libsoup sys-deps resolve. (macOS uses the system WebKit.)
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
          # Cache the npm download cache keyed off package-lock.json.
          cache: npm

      - name: Set up Rust toolchain
        # dtolnay/rust-toolchain is the Tauri-recommended toolchain action; it is
        # channel-pinned here to `stable`. Pin to a commit SHA for stricter
        # supply-chain hardening.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2.7.5
        with:
          # Cargo.toml/Cargo.lock live in src-tauri, so cache that workspace.
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Run the Rust unit/integration tests on BOTH legs — the tunnel-spec
      # parsing, port allocation, and lifecycle logic must pass on macOS and Linux.
      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      # Build the release bundles. On a version-tag push, tauri-action also
      # creates/updates a GitHub Release and attaches the bundles to it; on
      # branch/PR runs tagName is empty so it just builds (no Release).
      - name: Build release bundles
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tagName empty on non-tag runs → tauri-action builds without releasing.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Jonggrang Tunnel {0}', github.ref_name) || '' }}
          releaseBody: 'Automated macOS (.dmg/.app) and Linux (.deb/.AppImage) bundles built by CI.'
          releaseDraft: false
          prerelease: false

      # Upload the built bundles as workflow artifacts on EVERY run (branch, PR,
      # and tag) so they're downloadable from the Actions run page regardless of
      # whether a Release was cut.
      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4.4.3
        with:
          name: bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
